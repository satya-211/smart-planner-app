<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Productivity Planner</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <i class="fa-solid fa-bolt"></i> SmartPlanner
            </div>
            <div class="motivation-quote" id="motivation-quote">
                "Small progress every day leads to big success."
            </div>
            <div class="productivity-score">
                <i class="fa-solid fa-trophy"></i> Score: <span id="score-val">0</span>
            </div>
        </header>

        <main class="main-content">
            <!-- Dashboard Stats -->
            <section class="dashboard">
                <div class="stat-card glass">
                    <div class="stat-icon blue"><i class="fa-solid fa-list-check"></i></div>
                    <div class="stat-info">
                        <h3>Total Tasks</h3>
                        <p id="total-tasks">0</p>
                    </div>
                </div>
                <div class="stat-card glass">
                    <div class="stat-icon orange"><i class="fa-solid fa-clock"></i></div>
                    <div class="stat-info">
                        <h3>Pending</h3>
                        <p id="pending-tasks">0</p>
                    </div>
                </div>
                <div class="stat-card glass">
                    <div class="stat-icon green"><i class="fa-solid fa-check-double"></i></div>
                    <div class="stat-info">
                        <h3>Completed</h3>
                        <p id="completed-tasks">0</p>
                    </div>
                </div>
                <div class="stat-card progress-card glass">
                    <div class="progress-info">
                        <h3>Daily Progress</h3>
                        <p id="progress-text">0%</p>
                    </div>
                    <div class="progress-bar-container">
                        <div class="progress-bar" id="progress-bar"></div>
                    </div>
                </div>
            </section>

            <div class="content-grid">
                <!-- Task Input Area -->
                <section class="task-input-section glass">
                    <h2>Add New Task</h2>
                    <form id="task-form">
                        <div class="form-group">
                            <label for="task-title">What needs to be done?</label>
                            <input type="text" id="task-title" placeholder="e.g., Finish project report" required>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="task-category">Category</label>
                                <select id="task-category" required>
                                    <option value="Work">Work</option>
                                    <option value="Study">Study</option>
                                    <option value="Personal">Personal</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="task-priority">Priority</label>
                                <select id="task-priority" required>
                                    <option value="High">High</option>
                                    <option value="Medium" selected>Medium</option>
                                    <option value="Low">Low</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="task-deadline">Deadline</label>
                                <input type="date" id="task-deadline" required>
                            </div>
                        </div>
                        <button type="submit" class="primary-btn"><i class="fa-solid fa-plus"></i> Add Task</button>
                    </form>
                </section>

                <!-- Task Lists -->
                <section class="task-lists-section">
                    <div class="task-list-container glass">
                        <h2>Pending Tasks</h2>
                        <div class="task-list" id="pending-list">
                            <!-- Tasks will be injected here -->
                            <div class="empty-state" id="pending-empty">No pending tasks. You're all caught up!</div>
                        </div>
                    </div>

                    <div class="task-list-container glass dark-glass">
                        <h2>Completed Tasks <button id="clear-completed" class="text-btn" title="Clear All"><i class="fa-solid fa-trash-can"></i></button></h2>
                        <div class="task-list" id="completed-list">
                            <!-- Completed tasks will be injected here -->
                            <div class="empty-state" id="completed-empty">No completed tasks yet. Get to work!</div>
                        </div>
                    </div>
                </section>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
